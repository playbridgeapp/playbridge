info:
  name: Add Addon
  type: http
  seq: 4

http:
  method: post
  url: "{{baseUrl}}/api/addons"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "url": "https://example.com/manifest.json",
        "name": "MyAddon",
        "priority": 0,
        "timeout_ms": 8000
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
