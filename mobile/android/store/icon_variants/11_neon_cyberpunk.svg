<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="PlayBridge — Neon Cyberpunk">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14081c"/>
      <stop offset="1" stop-color="#05010a"/>
    </linearGradient>
    <radialGradient id="tileGlow" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#00ffff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00ffff"/>
      <stop offset="0.5" stop-color="#ff00ff"/>
      <stop offset="1" stop-color="#8a2be2"/>
    </linearGradient>
    <filter id="pGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#ff00ff" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#tile)"/>
  <rect width="512" height="512" rx="112" fill="url(#tileGlow)"/>
  <g filter="url(#pGlow)">
    <path fill="url(#bond)" fill-rule="evenodd" d="
      M168 139 a14 14 0 0 1 14 -14
      H244 a116 80 0 0 1 0 160
      V396 a14 14 0 0 1 -14 14
      H182 a14 14 0 0 1 -14 -14 Z
      M244 175 a45 30 0 0 1 0 60 Z
    "/>
  </g>
</svg>
