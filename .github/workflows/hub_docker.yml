name: Build and Push Hub Docker Images

on:
  push:
    branches: [ "main" ]
    paths:
      - 'hub/**'
      - '.github/workflows/hub_docker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_SERVER: truedem0n/playbridge-hub-server
  IMAGE_NAME_UI: truedem0n/playbridge-hub-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Hub Server
        uses: docker/build-push-action@v5
        with:
          context: ./hub/server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:latest

      - name: Build and push Hub UI
        uses: docker/build-push-action@v5
        with:
          context: ./hub/ui
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}:latest
