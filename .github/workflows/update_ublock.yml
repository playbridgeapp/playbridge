name: Auto Update uBlock Origin

on:
  schedule:
    # Run automatically every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  update-ublock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Update Phone uBlock
        working-directory: ./mobile/android
        run: |
          chmod +x gradlew
          ./gradlew :app:updateUblock

      - name: Update TV Plugin uBlock
        working-directory: ./tv/android/geckoview-plugin
        run: |
          chmod +x gradlew
          ./gradlew :geckoview-plugin:app:updateUblock

      - name: Check for Changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create a unique branch name
          BRANCH_NAME="chore/update-ublock-$(date +%Y%m%d)"
          git checkout -b "$BRANCH_NAME"
          
          # Commit and Push
          git add -A
          git commit -m "chore: auto-update uBlock Origin to latest release"
          git push origin "$BRANCH_NAME"
          
          # Open PR using GitHub CLI
          gh pr create \
            --title "chore: auto-update uBlock Origin" \
            --body "This automated PR updates the pre-built uBlock Origin assets for both phone and TV modules to the latest version." \
            --head "$BRANCH_NAME" \
            --base main
