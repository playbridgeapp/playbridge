name: Android Build

on:
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-phone:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./phone

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      env:
        PLAYBRIDGE_KEYSTORE_BASE64: ${{ secrets.PLAYBRIDGE_KEYSTORE_BASE64 }}
      run: |
        mkdir -p ../keystore
        echo $PLAYBRIDGE_KEYSTORE_BASE64 | base64 -d > ../keystore/release.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      env:
        PLAYBRIDGE_STORE_PASSWORD: ${{ secrets.PLAYBRIDGE_STORE_PASSWORD }}
        PLAYBRIDGE_KEY_ALIAS: ${{ secrets.PLAYBRIDGE_KEY_ALIAS }}
        PLAYBRIDGE_KEY_PASSWORD: ${{ secrets.PLAYBRIDGE_KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'versionName =' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Rename APKs
      run: |
        find app/build/outputs/apk/release -name "*.apk" -type f | while read f; do
          mv "$f" "$(dirname "$f")/playbridge-phone-${{ steps.version.outputs.version }}-$(basename "$f")"
        done

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phone-release-apk
        path: phone/app/build/outputs/apk/release/*.apk
        retention-days: 1

  build-tv-player:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tv/player

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      env:
        PLAYBRIDGE_KEYSTORE_BASE64: ${{ secrets.PLAYBRIDGE_KEYSTORE_BASE64 }}
      run: |
        mkdir -p ../../../keystore
        echo $PLAYBRIDGE_KEYSTORE_BASE64 | base64 -d > ../../../keystore/release.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      env:
        PLAYBRIDGE_STORE_PASSWORD: ${{ secrets.PLAYBRIDGE_STORE_PASSWORD }}
        PLAYBRIDGE_KEY_ALIAS: ${{ secrets.PLAYBRIDGE_KEY_ALIAS }}
        PLAYBRIDGE_KEY_PASSWORD: ${{ secrets.PLAYBRIDGE_KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'versionName =' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Rename APKs
      run: |
        find app/build/outputs/apk/release -name "*.apk" -type f | while read f; do
          mv "$f" "$(dirname "$f")/playbridge-tv-player-${{ steps.version.outputs.version }}-$(basename "$f")"
        done

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: tv-player-release-apk
        path: tv/player/app/build/outputs/apk/release/*.apk
        retention-days: 1

  build-tv-browser:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tv/browser

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      env:
        PLAYBRIDGE_KEYSTORE_BASE64: ${{ secrets.PLAYBRIDGE_KEYSTORE_BASE64 }}
      run: |
        mkdir -p ../../../keystore
        echo $PLAYBRIDGE_KEYSTORE_BASE64 | base64 -d > ../../../keystore/release.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      env:
        PLAYBRIDGE_STORE_PASSWORD: ${{ secrets.PLAYBRIDGE_STORE_PASSWORD }}
        PLAYBRIDGE_KEY_ALIAS: ${{ secrets.PLAYBRIDGE_KEY_ALIAS }}
        PLAYBRIDGE_KEY_PASSWORD: ${{ secrets.PLAYBRIDGE_KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'versionName =' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Rename APKs
      run: |
        find app/build/outputs/apk/release -name "*.apk" -type f | while read f; do
          mv "$f" "$(dirname "$f")/playbridge-tv-browser-${{ steps.version.outputs.version }}-$(basename "$f")"
        done

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: tv-browser-release-apk
        path: tv/browser/app/build/outputs/apk/release/*.apk
        retention-days: 1

  release:
    needs: [build-phone, build-tv-player, build-tv-browser]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Phone APK
        uses: actions/download-artifact@v4
        with:
          name: phone-release-apk
          path: output/phone

      - name: Download TV Player APK
        uses: actions/download-artifact@v4
        with:
          name: tv-player-release-apk
          path: output/tv-player

      - name: Download TV Browser APK
        uses: actions/download-artifact@v4
        with:
          name: tv-browser-release-apk
          path: output/tv-browser

      - name: Get versions
        id: versions
        run: |
          PHONE=$(grep 'versionName =' phone/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          PLAYER=$(grep 'versionName =' tv/player/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          BROWSER=$(grep 'versionName =' tv/browser/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          echo "phone=$PHONE" >> $GITHUB_OUTPUT
          echo "player=$PLAYER" >> $GITHUB_OUTPUT
          echo "browser=$BROWSER" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: phone-v${{ steps.versions.outputs.phone }}
          name: PlayBridge Phone v${{ steps.versions.outputs.phone }}
          body: |
            **Phone:** v${{ steps.versions.outputs.phone }}
            **TV Player:** v${{ steps.versions.outputs.player }}
            **TV Browser:** v${{ steps.versions.outputs.browser }}
          files: |
            output/phone/*.apk
            output/tv-player/*.apk
            output/tv-browser/*.apk
          generate_release_notes: true
