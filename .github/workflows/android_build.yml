name: Android Build

on:
  push:
    branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-phone:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./phone
    outputs:
      version: ${{ steps.version.outputs.version }}
      skipped: ${{ steps.check_tag.outputs.skipped }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'versionName =' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check tag
      id: check_tag
      run: |
        if git rev-parse "phone-v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
          echo "skipped=true" >> $GITHUB_OUTPUT
          echo "⏭️ phone-v${{ steps.version.outputs.version }} already exists, skipping."
        else
          echo "skipped=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up JDK 17
      if: steps.check_tag.outputs.skipped == 'false'
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      if: steps.check_tag.outputs.skipped == 'false'
      env:
        PLAYBRIDGE_KEYSTORE_BASE64: ${{ secrets.PLAYBRIDGE_KEYSTORE_BASE64 }}
      run: |
        set -euo pipefail
        mkdir -p ../keystore
        echo "$PLAYBRIDGE_KEYSTORE_BASE64" | base64 -d > ../keystore/release.jks
        [ -s ../keystore/release.jks ] || { echo "ERROR: Keystore file is empty — PLAYBRIDGE_KEYSTORE_BASE64 secret may not be set"; exit 1; }

    - name: Grant execute permission for gradlew
      if: steps.check_tag.outputs.skipped == 'false'
      run: chmod +x gradlew

    - name: Build Release APK + AAB
      if: steps.check_tag.outputs.skipped == 'false'
      env:
        PLAYBRIDGE_STORE_PASSWORD: ${{ secrets.PLAYBRIDGE_STORE_PASSWORD }}
        PLAYBRIDGE_KEY_ALIAS: ${{ secrets.PLAYBRIDGE_KEY_ALIAS }}
        PLAYBRIDGE_KEY_PASSWORD: ${{ secrets.PLAYBRIDGE_KEY_PASSWORD }}
      run: ./gradlew assembleRelease bundleRelease

    - name: Rename outputs
      if: steps.check_tag.outputs.skipped == 'false'
      run: |
        find app/build/outputs/apk/release -name "*.apk" -type f | while read f; do
          mv "$f" "$(dirname "$f")/playbridge-phone-${{ steps.version.outputs.version }}-$(basename "$f")"
        done
        mv app/build/outputs/bundle/release/app-release.aab \
           app/build/outputs/bundle/release/playbridge-phone-${{ steps.version.outputs.version }}.aab

    - name: List outputs (Debug)
      if: steps.check_tag.outputs.skipped == 'false'
      run: |
        echo "APK outputs:"
        find app/build/outputs/apk/release -maxdepth 2
        echo "Bundle outputs:"
        find app/build/outputs/bundle/release -maxdepth 2

    - name: Upload to R2
      if: steps.check_tag.outputs.skipped == 'false'
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      run: |
        aws s3 cp app/build/outputs/apk/release/ \
          s3://${{ secrets.R2_BUCKET }}/phone-release-apk/ \
          --recursive --exclude "*" --include "*.apk"
        aws s3 cp app/build/outputs/bundle/release/ \
          s3://${{ secrets.R2_BUCKET }}/phone-release-aab/ \
          --recursive --exclude "*" --include "*.aab"

  build-tv-player:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tv/player
    outputs:
      version: ${{ steps.version.outputs.version }}
      skipped: ${{ steps.check_tag.outputs.skipped }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'versionName =' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check tag
      id: check_tag
      run: |
        if git rev-parse "tv-player-v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
          echo "skipped=true" >> $GITHUB_OUTPUT
          echo "⏭️ tv-player-v${{ steps.version.outputs.version }} already exists, skipping."
        else
          echo "skipped=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up JDK 17
      if: steps.check_tag.outputs.skipped == 'false'
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      if: steps.check_tag.outputs.skipped == 'false'
      env:
        PLAYBRIDGE_KEYSTORE_BASE64: ${{ secrets.PLAYBRIDGE_KEYSTORE_BASE64 }}
      run: |
        set -euo pipefail
        mkdir -p ../../keystore
        echo "$PLAYBRIDGE_KEYSTORE_BASE64" | base64 -d > ../../keystore/release.jks
        [ -s ../../keystore/release.jks ] || { echo "ERROR: Keystore file is empty — PLAYBRIDGE_KEYSTORE_BASE64 secret may not be set"; exit 1; }

    - name: Grant execute permission for gradlew
      if: steps.check_tag.outputs.skipped == 'false'
      run: chmod +x gradlew

    - name: Build Release APK + AAB
      if: steps.check_tag.outputs.skipped == 'false'
      env:
        PLAYBRIDGE_STORE_PASSWORD: ${{ secrets.PLAYBRIDGE_STORE_PASSWORD }}
        PLAYBRIDGE_KEY_ALIAS: ${{ secrets.PLAYBRIDGE_KEY_ALIAS }}
        PLAYBRIDGE_KEY_PASSWORD: ${{ secrets.PLAYBRIDGE_KEY_PASSWORD }}
      run: ./gradlew assembleRelease bundleRelease

    - name: Rename outputs
      if: steps.check_tag.outputs.skipped == 'false'
      run: |
        find app/build/outputs/apk/release -name "*.apk" -type f | while read f; do
          mv "$f" "$(dirname "$f")/playbridge-tv-player-${{ steps.version.outputs.version }}-$(basename "$f")"
        done
        mv app/build/outputs/bundle/release/app-release.aab \
           app/build/outputs/bundle/release/playbridge-tv-player-${{ steps.version.outputs.version }}.aab

    - name: List outputs (Debug)
      if: steps.check_tag.outputs.skipped == 'false'
      run: |
        echo "APK outputs:"
        find app/build/outputs/apk/release -maxdepth 2
        echo "Bundle outputs:"
        find app/build/outputs/bundle/release -maxdepth 2

    - name: Upload to R2
      if: steps.check_tag.outputs.skipped == 'false'
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      run: |
        aws s3 cp app/build/outputs/apk/release/ \
          s3://${{ secrets.R2_BUCKET }}/tv-player-release-apk/ \
          --recursive --exclude "*" --include "*.apk"
        aws s3 cp app/build/outputs/bundle/release/ \
          s3://${{ secrets.R2_BUCKET }}/tv-player-release-aab/ \
          --recursive --exclude "*" --include "*.aab"

  build-tv-browser:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tv/browser
    outputs:
      version: ${{ steps.version.outputs.version }}
      skipped: ${{ steps.check_tag.outputs.skipped }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'versionName =' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check tag
      id: check_tag
      run: |
        if git rev-parse "tv-browser-v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
          echo "skipped=true" >> $GITHUB_OUTPUT
          echo "⏭️ tv-browser-v${{ steps.version.outputs.version }} already exists, skipping."
        else
          echo "skipped=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up JDK 17
      if: steps.check_tag.outputs.skipped == 'false'
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      if: steps.check_tag.outputs.skipped == 'false'
      env:
        PLAYBRIDGE_KEYSTORE_BASE64: ${{ secrets.PLAYBRIDGE_KEYSTORE_BASE64 }}
      run: |
        set -euo pipefail
        mkdir -p ../../keystore
        echo "$PLAYBRIDGE_KEYSTORE_BASE64" | base64 -d > ../../keystore/release.jks
        [ -s ../../keystore/release.jks ] || { echo "ERROR: Keystore file is empty — PLAYBRIDGE_KEYSTORE_BASE64 secret may not be set"; exit 1; }

    - name: Grant execute permission for gradlew
      if: steps.check_tag.outputs.skipped == 'false'
      run: chmod +x gradlew

    - name: Build Release APK + AAB
      if: steps.check_tag.outputs.skipped == 'false'
      env:
        PLAYBRIDGE_STORE_PASSWORD: ${{ secrets.PLAYBRIDGE_STORE_PASSWORD }}
        PLAYBRIDGE_KEY_ALIAS: ${{ secrets.PLAYBRIDGE_KEY_ALIAS }}
        PLAYBRIDGE_KEY_PASSWORD: ${{ secrets.PLAYBRIDGE_KEY_PASSWORD }}
      run: ./gradlew assembleRelease bundleRelease

    - name: Rename outputs
      if: steps.check_tag.outputs.skipped == 'false'
      run: |
        # Rename APKs
        find app/build/outputs/apk/release -name "*.apk" -type f | while read f; do
          mv "$f" "$(dirname "$f")/playbridge-tv-browser-${{ steps.version.outputs.version }}-$(basename "$f")"
        done
        # Rename Bundles (AABs) - using find to be safer
        find app/build/outputs/bundle/release -name "*.aab" -type f | while read f; do
          mv "$f" "$(dirname "$f")/playbridge-tv-browser-${{ steps.version.outputs.version }}.aab"
        done

    - name: List outputs (Debug)
      if: steps.check_tag.outputs.skipped == 'false'
      run: |
        echo "APK outputs:"
        find app/build/outputs/apk/release -maxdepth 2
        echo "Bundle outputs:"
        find app/build/outputs/bundle/release -maxdepth 2

    - name: Upload to R2
      if: steps.check_tag.outputs.skipped == 'false'
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      run: |
        aws s3 cp app/build/outputs/apk/release/ \
          s3://${{ secrets.R2_BUCKET }}/tv-browser-release-apk/ \
          --recursive --exclude "*" --include "*.apk"
        aws s3 cp app/build/outputs/bundle/release/ \
          s3://${{ secrets.R2_BUCKET }}/tv-browser-release-aab/ \
          --recursive --exclude "*" --include "*.aab"

  release:
    needs: [build-phone, build-tv-player, build-tv-browser]
    if: |
      (success() || always()) &&
      (needs.build-phone.outputs.skipped == 'false' || 
       needs.build-tv-player.outputs.skipped == 'false' || 
       needs.build-tv-browser.outputs.skipped == 'false') &&
      (needs.build-phone.result != 'failure' && 
       needs.build-tv-player.result != 'failure' && 
       needs.build-tv-browser.result != 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          aws s3 sync s3://${{ secrets.R2_BUCKET }}/ output/

      - name: Get versions
        id: versions
        run: |
          PHONE=$(grep 'versionName =' phone/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          PLAYER=$(grep 'versionName =' tv/player/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          BROWSER=$(grep 'versionName =' tv/browser/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          echo "phone=$PHONE" >> $GITHUB_OUTPUT
          echo "player=$PLAYER" >> $GITHUB_OUTPUT
          echo "browser=$BROWSER" >> $GITHUB_OUTPUT

      - name: Create Phone release
        if: needs.build-phone.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: phone-v${{ steps.versions.outputs.phone }}
          name: PlayBridge Phone v${{ steps.versions.outputs.phone }}
          body: |
            **Phone:** v${{ steps.versions.outputs.phone }}

            > `.aab` files are for Play Store. `.apk` files are for sideloading.
          files: output/phone-release-*/*
          generate_release_notes: true
          draft: true

      - name: Create TV Player release
        if: needs.build-tv-player.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: tv-player-v${{ steps.versions.outputs.player }}
          name: PlayBridge TV Player v${{ steps.versions.outputs.player }}
          body: |
            **TV Player:** v${{ steps.versions.outputs.player }}

            > `.aab` files are for Play Store. `.apk` files are for sideloading.
          files: output/tv-player-release-*/*
          generate_release_notes: true
          draft: true

      - name: Create TV Browser release
        if: needs.build-tv-browser.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: tv-browser-v${{ steps.versions.outputs.browser }}
          name: PlayBridge TV Browser v${{ steps.versions.outputs.browser }}
          body: |
            **TV Browser:** v${{ steps.versions.outputs.browser }}

            > `.aab` files are for Play Store. `.apk` files are for sideloading.
          files: output/tv-browser-release-*/*
          generate_release_notes: true
          draft: true

      - name: Publish Phone to Play Store (alpha)
        if: needs.build-phone.outputs.skipped == 'false'
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.playbridge.sender
          releaseFiles: output/phone-release-aab/*.aab
          track: alpha
          status: draft

      - name: Publish TV Player to Play Store (alpha)
        if: needs.build-tv-player.outputs.skipped == 'false'
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.playbridge.player
          releaseFiles: output/tv-player-release-aab/*.aab
          track: alpha
          status: draft

      - name: Publish TV Browser to Play Store (alpha)
        if: needs.build-tv-browser.outputs.skipped == 'false'
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.playbridge.browser
          releaseFiles: output/tv-browser-release-aab/*.aab
          track: alpha
          status: draft

      - name: Clean up R2 after release
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          aws s3 rm s3://${{ secrets.R2_BUCKET }}/ --recursive
