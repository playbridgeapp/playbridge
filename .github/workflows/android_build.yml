name: Android Build

on:
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for tags
      
      - name: Read Version
        id: get_version
        run: |
          VERSION=$(grep 'VERSION_NAME' version.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if Tag Exists
        id: check_tag
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist. Will release."
          fi

  build-phone:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./phone

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      env:
        PLAYBRIDGE_KEYSTORE_BASE64: ${{ secrets.PLAYBRIDGE_KEYSTORE_BASE64 }}
      run: |
        mkdir -p ../keystore
        echo $PLAYBRIDGE_KEYSTORE_BASE64 | base64 -d > ../keystore/release.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      env:
        PLAYBRIDGE_STORE_PASSWORD: ${{ secrets.PLAYBRIDGE_STORE_PASSWORD }}
        PLAYBRIDGE_KEY_ALIAS: ${{ secrets.PLAYBRIDGE_KEY_ALIAS }}
        PLAYBRIDGE_KEY_PASSWORD: ${{ secrets.PLAYBRIDGE_KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Rename APKs
      env:
        VERSION: ${{ needs.check-version.outputs.version }}
      run: |
        find app/build/outputs/apk -name "*.apk" -type f | while read f; do
          mv "$f" "$(dirname "$f")/playbridge-phone-${VERSION}-$(basename "$f")"
        done

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phone-release-apk
        path: phone/app/build/outputs/apk/**/*.apk
        retention-days: 1

  build-tv:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tv

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      env:
        PLAYBRIDGE_KEYSTORE_BASE64: ${{ secrets.PLAYBRIDGE_KEYSTORE_BASE64 }}
      run: |
        mkdir -p ../keystore
        echo $PLAYBRIDGE_KEYSTORE_BASE64 | base64 -d > ../keystore/release.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      env:
        PLAYBRIDGE_STORE_PASSWORD: ${{ secrets.PLAYBRIDGE_STORE_PASSWORD }}
        PLAYBRIDGE_KEY_ALIAS: ${{ secrets.PLAYBRIDGE_KEY_ALIAS }}
        PLAYBRIDGE_KEY_PASSWORD: ${{ secrets.PLAYBRIDGE_KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Rename APKs
      env:
        VERSION: ${{ needs.check-version.outputs.version }}
      run: |
        find app/build/outputs/apk -name "*.apk" -type f | while read f; do
          mv "$f" "$(dirname "$f")/playbridge-tv-${VERSION}-$(basename "$f")"
        done

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: tv-release-apk
        path: tv/app/build/outputs/apk/**/*.apk
        retention-days: 1

  release:
    needs: [check-version, build-phone, build-tv]
    if: needs.check-version.outputs.tag_exists == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Phone APK
        uses: actions/download-artifact@v4
        with:
          name: phone-release-apk
          path: output/phone

      - name: Download TV APK
        uses: actions/download-artifact@v4
        with:
          name: tv-release-apk
          path: output/tv

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          files: |
            output/phone/**/*.apk
            output/tv/**/*.apk
          generate_release_notes: true
