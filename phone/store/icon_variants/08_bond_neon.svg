<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="PlayBridge — Bond Neon">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020210"/>
      <stop offset="1" stop-color="#000005"/>
    </linearGradient>
    <radialGradient id="tileGlow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bond" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#a4ff3c"/>
      <stop offset="0.46" stop-color="#00d4ff"/>
      <stop offset="0.5" stop-color="#7b3cff"/>
      <stop offset="0.54" stop-color="#ff3ca4"/>
      <stop offset="1" stop-color="#ff0080"/>
    </linearGradient>
    <filter id="pGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#ff3ca4" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#tile)"/>
  <rect width="512" height="512" rx="112" fill="url(#tileGlow)"/>
  <g filter="url(#pGlow)">
    <path fill="url(#bond)" fill-rule="evenodd" d="
      M168 139 a14 14 0 0 1 14 -14
      H244 a116 80 0 0 1 0 160
      V396 a14 14 0 0 1 -14 14
      H182 a14 14 0 0 1 -14 -14 Z
      M244 175 a45 30 0 0 1 0 60 Z
    "/>
  </g>
</svg>
